<section id="experience" class="experience fade-in">
    <div class="container">
      <div class="section-title">
        <h2>Work Experience</h2>
        <p>My professional journey and key contributions</p>
      </div>
  
      <div class="timeline">
        <div
          class="timeline-item"
          *ngFor="let exp of experiences"
          [class.current]="exp.isCurrent"
        >
          <div class="timeline-dot"></div>
          <div class="timeline-content card">
            <div class="current-badge" *ngIf="exp.isCurrent">Current</div>
            <h3>{{ exp.role }}</h3>
            <div class="company-info">
              <p class="company-name">{{ exp.company }}</p>
              <p class="location">{{ exp.location }}</p>
              <p class="period">{{ exp.period }}</p>
            </div>
            <ul class="achievements">
              <li *ngFor="let achievement of exp.achievements">{{ achievement }}</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </section>
