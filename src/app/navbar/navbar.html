<nav class="navbar" [class.scrolled]="isScrolled">
    <div class="navbar-container">
      <a href="#hero" class="logo" (click)="navigate('hero', $event)">Portfolio</a>
  
      <button
        class="menu-toggle"
        [class.active]="isMenuOpen"
        (click)="toggleMenu()"
        aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
  
      <ul class="nav-links" [class.active]="isMenuOpen">
        <li *ngFor="let link of navLinks">
          <a [href]="'#' + link.id" (click)="navigate(link.id, $event)">{{ link.text }}</a>
        </li>
      </ul>
    </div>
  </nav>
