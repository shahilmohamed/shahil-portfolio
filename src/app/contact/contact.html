<section id="contact" class="contact fade-in">
    <div class="container">
      <div class="section-title">
        <h2>Get In Touch</h2>
        <p>Feel free to reach out for collaborations or opportunities</p>
      </div>
  
      <div class="contact-content">
        <div class="contact-info">
          <div class="contact-card card">
            <div class="contact-item">
              <div class="contact-icon">📧</div>
              <div class="contact-details">
                <h3>Email</h3>
                <p><a href="mailto:shahil.m.mohamed@gmail.com">shahil.m.mohamed@gmail.com</a></p>
              </div>
            </div>
            <div class="contact-item">
              <div class="contact-icon">📞</div>
              <div class="contact-details">
                <h3>Phone</h3>
                <p><a href="tel:+918608841424">+91 8608841424</a></p>
              </div>
            </div>
            <div class="contact-item">
              <div class="contact-icon">📍</div>
              <div class="contact-details">
                <h3>Location</h3>
                <p>Bangalore, India</p>
              </div>
            </div>
          </div>
        </div>
  
        <div class="contact-form card">
          <h3>Send Me a Message</h3>
          <div *ngIf="successMessage" class="form-message success">{{ successMessage }}</div>
          <div *ngIf="errorMessage" class="form-message error">{{ errorMessage }}</div>
          <form (ngSubmit)="submit()" #f="ngForm">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" [(ngModel)]="model.name" required>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" [(ngModel)]="model.email" required>
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="5" [(ngModel)]="model.message" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </section>
